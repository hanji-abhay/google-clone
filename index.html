<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="style.css">
</head>
<body> 
    <header class="profile">
        <span class="gmail"><a href="https://www.gmail.com">Gmail</a></span>
        <span class="images"><a href="https://www.google.com/imghp">Images</a></span>
        <div class="waffle-icon" title="Google Apps">
            <svg xmlns="http://w3.org" viewBox="0 0 24 24" width="22" height="22">
                <circle cx="5" cy="6" r="2.1" fill="#101010"/>
                <circle cx="12" cy="6" r="2.1" fill="#101010"/>
                <circle cx="19" cy="6" r="2.1" fill="#101010"/>
                <circle cx="5" cy="13" r="2.1" fill="#101010"/>
                <circle cx="12" cy="13" r="2.1" fill="#101010"/>
                <circle cx="19" cy="13" r="2.1" fill="#101010"/>
                <circle cx="5" cy="20" r="2.1" fill="#101010"/>
                <circle cx="12" cy="20" r="2.1" fill="#101010"/>
                <circle cx="19" cy="20" r="2.1" fill="#101010"/>
            </svg>
        </div>
        
        <div class="app-container">
            <div class="app" data-url="https://myaccount.google.com"><img src="assets/profile-pic.png"><span>Account</span></div>
            <div class="app" data-url="https://www.drive.google.com"><img src="assets/drive.png"><span>Drive</span></div>
            <div class="app" data-url="https://www.gmail.com"><img src="assets/gmail.png"><span>Gmail</span></div>
            <div class="app" data-url="https://www.youtube.com"><img src="assets/youtube.png"><span>YouTube</span></div>
            <div class="app" data-url="https://gemini.google.com"><img src="assets/gemini.png"><span>Gemini</span></div>
            <div class="app" data-url="https://maps.google.com"><img src="assets/map.png"><span>Maps</span></div>
            <div class="app" data-url="https://www.photos.google.com"><img src="assets/photos.png"><span>Photos</span></div>
        </div>

        <div class="profile-wrapper">
            <div class="profile-pic" id="profileBtn" title="Google Account  
Abhay Mathur  
abhaymathur629@gmail.com">
                <img src="assets/profile-pic.png" alt="Profile">
            </div>
            <div class="account-panel" id="accountPanel">
                        <div class="account-header">
            <p>abhaymathur629@gmail.com</p>
            <img src="assets/profile-pic.png">
            <div>
               <strong>Hi, Abhay!</strong>
               <br>
               <br>
                <button class="manage">Manage your Google Account</button>
            </div>
        </div>
       <br>
   <div class="middle">
        <button class="top">Hide more accounts <span class="arrow">^</span></button>
        <button class="center"><span class="avatar">A</span>
            <span class="account-info"><span>Abhay Mathur</span>
        <p>abhaymathur629@gmail.com</p></span>       
     </button>
        <button class="center"><span class="plus">+</span><p class="addAccount">Add another account</p></button>
        <button class="bottom"><span class="exit">[ → </span>Sign out of all accounts</button>
        </div>
            </div>
        </div>
    </header>

    <main>
        <img class="logo" src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" alt="Google Logo" width="272" height="92" />

        <!-- Fully Restructured Search Field -->
        <div class="search-container">
            
            <div class="plus-icon-wrap" title="Enhance your search with tabs, files or an AI tool">
                <div class="plus-icon">
                <svg xmlns="http://w3.org" viewBox="0 0 24 24" width="22" height="22">
                    <path d="M12 5v14M5 12h14" fill="none" stroke="#1F1F1F" stroke-width="2" stroke-linecap="round"/>
                </svg>
                </div>
            </div>
            

            <input class="search-input" type="text" placeholder="Ask Google" />

            <div class="actions-group">
                <button class="mic" title="Voice Search">
                    <svg xmlns="http://w3.org" viewBox="0 0 24 24" width="22" height="22">
                        <rect x="10.3" y="2" width="3" height="11" rx="2.5" fill="#1F1F1F" stroke="#1F1F1F" stroke-width="2.8" stroke-linecap="round"/>
                        <path d="M5 11c0 3.87 3.13 7 7 7s7-3.13 7-7M12 18v3" fill="none" stroke="#1F1F1F" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                </button>

                <button class="lens" title="Search by image">
                    <svg xmlns="http://w3.org" viewBox="0 0 24 24" width="22" height="22">
                        <path d="M10 3.5h4" fill="none" stroke="#1F1F1F" stroke-width="3.4" stroke-linecap="round"/>
                        <path d="M4 12V9c0-2.5 2-4.5 4.5-4.5h7c2.5 0 4.5 2 4.5 4.5v3" fill="none" stroke="#1F1F1F" stroke-width="2.3" stroke-linecap="round"/>
                        <path d="M4 16v1c0 2.5 2.5 4 7 4h1" fill="none" stroke="#1F1F1F" stroke-width="2.3" stroke-linecap="round"/>
                        <circle cx="12" cy="12" r="2.8" fill="#1F1F1F"/>
                        <circle cx="18" cy="19" r="2" fill="#1F1F1F"/>
                    </svg>
                </button>

                <button class="AI-mode" id="aiBtn" title="Ask Google AI Mode">

                    <svg xmlns="http://w3.org" viewBox="0 0 32 32" width="28" height="28">
                        <mask id="ai-sparkle-buffer">
                        <rect width="32" height="32" fill="white" />
                        <circle cx="12.5" cy="10.5" r="4.5" fill="black" />
                        </mask>
                        <g mask="url(#ai-sparkle-buffer)">
                        <circle cx="9" cy="14" r="5" fill="none" stroke="#1F1F1F" stroke-width="1.8" />
                        <line x1="13.5" y1="18.5" x2="18.5" y2="23.5" stroke="#1F1F1F" stroke-width="1.8" stroke-linecap="round" />
                        </g>
                        <path d="M 15 4 Q 15 9 20 9 Q 15 9 15 14 Q 15 9 10 9 Q 15 9 15 4 Z" fill="#1F1F1F" />
                    </svg>
                    AI Mode
                </button>
            </div>
        </div>

        <div class="shortcuts" id="shortcuts">
            <div class="shortcut-container wattpad-container" title="Wattpad">
            <div class="dots" title="More actions for Wattpad Shortcut">&#x22EE
                <div class="menu">
                    <div  class="menu-item" data-action="edit">Edit Shortcut</div>
                    <div  class="menu-item" data-action="remove">Remove</div>
                </div>
            </div>

            <a href="https://www.wattpad.com" target="_blank">
            <button><img src="assets/wattpad-logo.png" alt="Wattpad Icon"></button></a>
            <span>Wattpad</span>
           </div>

        <div class="shortcut-container web-container" title="Web Store">
            <div class="dots" title="More actions for Web Store Shortcut">&#x22EE
                <div class="menu">
                    <div  class="menu-item" data-action="edit">Edit Shortcut</div>
                    <div  class="menu-item" data-action="remove">Remove</div>
                </div>
            </div>

            <a href="https://chrome.google.com/webstore" target="_blank">
            <button><img src="assets/webstore-logo.png" alt="Web Icon"></button></a>
            <span>Web Store</span>
        </div>
            <div class="shortcut-container">
                <div class="add-shortcuts" title="Add Shortcut" id="addShortcut">
                    <button><img src="assets/plus-icon.png" alt="Add Shortcut Icon"></button>
                    <span>Add Shortcut</span>
                </div>
            </div>
        </div>
    </main>
    <script src="main.js"></script>
</body>
</html>
